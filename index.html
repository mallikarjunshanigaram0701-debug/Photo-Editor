<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Photo Editor</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <aside class="sidebar">

            <h1>Photo Editor</h1>

            <input type="file" id="upload" accept="image/*">

            <div class="group">

                <h3>Adjustments</h3>

                <label>
                    Brightness
                    <input type="range" id="brightness" min="0" max="200" value="100">
                </label>

                <label>
                    Contrast
                    <input type="range" id="contrast" min="0" max="200" value="100">
                </label>

                <label>
                    Saturation
                    <input type="range" id="saturation" min="0" max="200" value="100">
                </label>

                <label>
                    Blur
                    <input type="range" id="blur" min="0" max="10" value="0">
                </label>

            </div>

            <div class="group">

                <h3>Filters</h3>

                <button class="filter" data-filter="normal">Normal</button>
                <button class="filter" data-filter="vintage">Vintage</button>
                <button class="filter" data-filter="bw">B&W</button>
                <button class="filter" data-filter="warm">Warm</button>
                <button class="filter" data-filter="cool">Cool</button>
                <button class="filter" data-filter="cinema">Cinema</button>

            </div>

            <div class="group">

                <h3>Transform</h3>

                <button id="rotateLeft">Rotate Left</button>
                <button id="rotateRight">Rotate Right</button>

                <button id="flipX">Flip X</button>
                <button id="flipY">Flip Y</button>

                <button id="zoomIn">Zoom In</button>
                <button id="zoomOut">Zoom Out</button>

            </div>

            <div class="group">

                <button id="reset">Reset</button>
                <button id="download">Download</button>

            </div>

        </aside>

        <!-- Editor Area -->

        <main class="editor">

            <canvas id="canvas"></canvas>

        </main>

    </div>

    <script src="js/app.js"></script>

</body>

  </html>
